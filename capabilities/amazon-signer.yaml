    resources:
    - name: revocations#signatureTimestamp&platformId&profileVersionArn&jobArn&certificateHa
      path: /revocations#signatureTimestamp&platformId&profileVersionArn&jobArn&certificateHashes
      operations:
      - name: getrevocationstatus
        method: GET
        description: Amazon Get Revocation Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: signatureTimestamp
          in: query
          type: string
          description: The timestamp of the signature that validates the profile or job.
          required: true
        - name: platformId
          in: query
          type: string
          description: The ID of a signing platform.
          required: true
        - name: profileVersionArn
          in: query
          type: string
          description: The version of a signing profile.
          required: true
        - name: jobArn
          in: query
          type: string
          description: The ARN of a signing job.
          required: true
        - name: certificateHashes
          in: query
          type: array
          description: <p>A list of composite signed hashes that identify certificates.</p> <p>A certificate identifier consists
            of a subject certificate TBS hash (signed by the paren
          required: true
