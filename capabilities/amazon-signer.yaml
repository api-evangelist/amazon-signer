  description: 'AWS Signer. 19 operations. Lead operation: Amazon Get Revocation Status. Self-contained Naftiko capability
    covering one Amazon Signer business surface.'
  tags:
  - Amazon Signer
  - AWS Signer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
