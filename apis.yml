aid: amazon-signer
name: Amazon Signer
description: >-
  AWS Signer is a fully managed code-signing service to ensure the trust and
  integrity of your code. It manages the code-signing certificate public and
  private keys and enables central management and deployment of code signing
  certificates for Lambda functions and IoT devices.
